<p class="doc-intro">Esta Política explica como o Alpha Prime utiliza cookies e tecnologias similares nos seus serviços digitais.</p>

<div class="doc-section"><h2>1. O Que São Cookies</h2>

<p class="doc-intro">These Terms and Conditions ("Terms") govern the use of the Alpha Prime application and associated services. By creating an account or using Alpha Prime, the user fully accepts these Terms. If you do not agree, you should not use the service.</p>

    <p>The licence refers exclusively to the right to use the Alpha Prime software and <strong>does not include IPTV lists, television channels, films, series or any other audiovisual content</strong>.</p>

<p>By purchasing an Alpha Prime licence, the user obtains <strong>exclusively the right to use the Alpha Prime software</strong> for the contracted period. The licence grants access to the software features, including when available:</p>

<p class="doc-intro">This Policy explains how Alpha Prime uses cookies and similar technologies in its digital services.</p>

<div class="doc-section"><h2>1. What Are Cookies</h2>
<p>Cookies are small text files stored on the user's device that allow the browser to be recognised and certain preferences to be saved between sessions.</p></div>

<div class="doc-section"><h2>2. Types of Cookies We Use</h2>
<p><strong>Essential Cookies</strong> — necessary for the service to function (authentication, security, session). Cannot be disabled without compromising the service.</p>
<p><strong>Functional Cookies</strong> — store user preferences (language, light/dark theme, interface settings). Improve experience without analytical purposes.</p>
<p><strong>Analytical Cookies</strong> — collect usage data in an aggregated and anonymous manner for service improvement (where applicable).</p>
<p><strong>Third-Party Cookies</strong> — external services such as Cloudflare (security and CDN) and payment processors may set their own cookies, governed by their respective privacy policies.</p></div>

<div class="doc-section"><h2>3. Local Storage</h2>
<p>In addition to cookies, Alpha Prime may use <em>localStorage</em> to save session preferences (e.g. theme, language). This data remains on the device and is not transmitted to third parties.</p></div>

<div class="doc-section"><h2>4. Managing Cookies</h2>
<p>Users can manage their cookie preferences through browser settings. Disabling essential cookies may prevent the service from functioning correctly.</p></div>

<div class="doc-section"><h2>5. Changes</h2>

<p class="doc-intro">Estos Términos y Condiciones ("Términos") regulan el uso de la aplicación Alpha Prime y los servicios asociados. Al crear una cuenta o utilizar Alpha Prime, el usuario acepta íntegramente estos Términos. Si no está de acuerdo, no deberá utilizar el servicio.</p>

<div class="doc-section"><h2>1. Objeto</h2>
<p>Alpha Prime es un software reproductor de medios (<em>media player</em>) que permite al usuario reproducir, organizar y gestionar listas IPTV compatibles de las que sea propietario o para las que tenga autorización. Alpha Prime <strong>no proporciona, produce, aloja, distribuye, retransmite, comercializa ni licencia ningún contenido audiovisual.</strong></p></div>

<div class="doc-section">
    <h2>2. Período de Prueba, Registro y Cuenta de Usuario</h2>
    <p>Alpha Prime puede utilizarse gratuitamente durante un período de prueba de <strong>7 (siete) días</strong>, sin necesidad de crear una cuenta. Al finalizar el período de prueba, para continuar usando la aplicación y gestionar las suscripciones de sus dispositivos, el usuario deberá registrarse proporcionando: nombre completo, país, número de teléfono de contacto, fecha de nacimiento, dirección de email válida y una contraseña que se almacenará en formato cifrado.</p>
    <p>Al crear una cuenta, el usuario declara que:</p>
    <ul>

        <li>Es responsable de mantener la confidencialidad de sus credenciales de acceso;</li>
        <li>Es el único responsable de todas las actividades realizadas en su cuenta;</li>
        <li>Notificará inmediatamente a Alpha Prime en caso de acceso no autorizado.</li>
    </ul>
</div>

<div class="doc-section">
    <h2>3. Licencia de Uso</h2>
    <p>Tras el período de prueba gratuito, la adquisición de una licencia otorga al usuario una licencia <strong>limitada, personal, intransferible, no exclusiva y revocable</strong> para utilizar la aplicación Alpha Prime durante el período contratado, exclusivamente para uso personal.</p>
    <p>La licencia se refiere exclusivamente al derecho de uso del software Alpha Prime y <strong>no incluye listas IPTV, canales de televisión, películas, series ni ningún otro contenido audiovisual</strong>.</p>

<div class="doc-section"><h2>4. Qué Está Adquiriendo</h2>
<p>Al adquirir una licencia, el usuario obtiene <strong>exclusivamente el derecho de utilizar el software Alpha Prime</strong>. La licencia incluye acceso a las funcionalidades del software, entre ellas:</p>
<ul><li>reproducción de listas IPTV compatibles;</li><li>guía electrónica de programas (EPG);</li><li>grabación de contenidos (cuando el dispositivo lo soporte);</li><li>actualizaciones de la aplicación;</li><li>soporte técnico relacionado con el funcionamiento del software.</li></ul>
<div class="doc-warning">⚠️ <strong>La licencia no incluye</strong> ninguna lista IPTV, canales de televisión, películas, series, eventos deportivos ni ningún otro contenido audiovisual. Para utilizar la aplicación, el usuario debe obtener una lista IPTV compatible de un proveedor debidamente autorizado, insertando las credenciales en la sección "Gestionar Listas".</div></div>

<div class="doc-section"><h2>5. Contenido de Terceros</h2>
<p>Alpha Prime es exclusivamente un reproductor de medios. La aplicación no proporciona canales de televisión, películas, series, eventos deportivos, emisoras de radio ni ningún otro contenido protegido por derechos de autor. Todo el contenido reproducido es suministrado exclusivamente por las listas añadidas por el propio usuario.</p>
<p>El usuario declara ser el único responsable del origen, legalidad y autorización de uso de las listas, URLs, credenciales o servidores configurados. Alpha Prime no verifica, controla, aprueba ni mantiene ninguna relación comercial con los proveedores de listas.</p></div>

<div class="doc-section"><h2>6. Proveedores de Listas</h2>

<div class="doc-section"><h2>7. Responsabilidades del Usuario</h2>

<div class="doc-section"><h2>12. Ley Aplicable</h2>
<p>Estos Términos se rigen por la legislación brasileña, en particular el Código de Defensa del Consumidor (Ley nº 8.078/1990), el Marco Civil de Internet (Ley nº 12.965/2014) y la Ley General de Protección de Datos Personales — LGPD (Ley nº 13.709/2018). Para la resolución de conflictos, se establece la jurisdicción de los tribunales del domicilio del usuario en Brasil, salvo disposición legal en contrario.</p>

    { id:'cookies', icon:'🍪', nav:'Política de Cookies', title:'Política de Cookies', date:'7 de julio de 2026', html:`
<p class="doc-intro">Esta Política explica cómo Alpha Prime utiliza cookies y tecnologías similares en sus servicios digitales.</p>

<div class="doc-section"><h2>1. ¿Qué Son las Cookies?</h2>
<p>Las cookies son pequeños archivos de texto almacenados en el dispositivo del usuario que permiten reconocer el navegador y guardar ciertas preferencias entre sesiones.</p></div>

<div class="doc-section"><h2>2. Tipos de Cookies que Utilizamos</h2>
<p><strong>Cookies Esenciales</strong> — necesarias para el funcionamiento del servicio (autenticación, seguridad, sesión). No pueden desactivarse sin comprometer el servicio.</p>
<p><strong>Cookies Funcionales</strong> — guardan preferencias del usuario (idioma, tema claro/oscuro, configuraciones). Mejoran la experiencia sin fines analíticos.</p>
<p><strong>Cookies Analíticas</strong> — recopilan datos de uso de forma agregada y anónima para la mejora del servicio (cuando aplique).</p>
<p><strong>Cookies de Terceros</strong> — servicios externos como Cloudflare y procesadores de pago pueden establecer sus propias cookies, regidas por sus respectivas políticas de privacidad.</p></div>

<div class="doc-section"><h2>3. Almacenamiento Local</h2>
<p>Además de cookies, Alpha Prime puede usar <em>localStorage</em> para guardar preferencias de sesión (p. ej., tema, idioma). Estos datos permanecen en el dispositivo y no se transmiten a terceros.</p></div>

<div class="doc-section"><h2>4. Gestión de Cookies</h2>
<p>El usuario puede gestionar sus preferencias de cookies a través de la configuración del navegador. Desactivar cookies esenciales puede impedir el correcto funcionamiento del servicio.</p></div>

<div class="doc-section"><h2>5. Cambios</h2>
<div class="doc-contact-box">Consultas: <a href="mailto:contato@alphaprimetv.com">contato@alphaprimetv.com</a></div></div>`},

/* ── Render Logic ────────────────────────────────────────────────────────── */
var currentLang = 'pt';
var currentDoc  = 'terms';

function renderSidebar() {
  var lang = LEGAL[currentLang];
  document.getElementById('sidebar-title').textContent = lang.sidebarTitle;
  var nav = document.getElementById('doc-nav');
  nav.innerHTML = lang.docs.map(function(d) {
    return '<button class="doc-nav-item' + (d.id === currentDoc ? ' active' : '') +
      '" onclick="switchDoc(\'' + d.id + '\')">' +
      '<span class="nav-icon">' + d.icon + '</span><span>' + d.nav + '</span></button>';
  }).join('');
}

function renderContent() {
  var lang = LEGAL[currentLang];
  var doc  = lang.docs.find(function(d){ return d.id === currentDoc; }) || lang.docs[0];
  document.getElementById('legal-content').innerHTML =
    '<div class="doc-badge">' + doc.icon + ' ' + doc.nav + '</div>' +
    '<h1 class="doc-title">' + doc.title + '</h1>' +
    '<p class="doc-updated">' + lang.updated + ' ' + doc.date + '</p>' +
    doc.html;
}

function renderPage() {
  var lang = LEGAL[currentLang];
  document.getElementById('page-heading').textContent  = lang.pageTitle;
  document.getElementById('page-sub').textContent      = lang.pageSub;
  document.getElementById('footer-rights').textContent = lang.footerRights;
  document.title = 'Alpha Prime — ' + lang.pageTitle;
}

function render() {
  renderPage();
  renderSidebar();
  renderContent();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function switchLang(lang) {
  if (!LEGAL[lang]) return;
  currentLang = lang;
  render();
}

function switchDoc(docId) {
  currentDoc = docId;
  render();
}

/* ── Init: read language from the site's i18n system ─────────────────────── */
function _getSiteLang() {
  var stored = localStorage.getItem('ap_lang');
  return (stored && LEGAL[stored]) ? stored : 'pt';
}

/* Patch window.__i18n.setLang so language changes in the header
   also update the legal page content in real time */
document.addEventListener('DOMContentLoaded', function () {
  if (window.__i18n && window.__i18n.setLang) {
    var _orig = window.__i18n.setLang;
    window.__i18n.setLang = function (lang) {
      _orig(lang);
      switchLang(lang);
    };
  }
});

currentLang = _getSiteLang();
render();
</script>
