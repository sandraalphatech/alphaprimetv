<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alpha Prime — Criar conta</title>
    <link rel="stylesheet" href="styles.css">
    <script>(function(){var t=localStorage.getItem('velvet-theme')||'dark';document.documentElement.setAttribute('data-theme',t);})();</script>
    <style>
        body { min-height: 100vh; display: flex; flex-direction: column; }
        .reg-page { flex: 1; display: flex; align-items: flex-start; justify-content: center; padding: 100px 16px 60px; background: radial-gradient(ellipse at 50% 0%, var(--secondary-color), var(--bg-dark) 70%); }
        .reg-card { background: var(--bg-secondary); border: 1px solid var(--border-color); border-radius: 20px; padding: 40px 36px; width: 100%; max-width: 480px; }
        .reg-logo { text-align: center; margin-bottom: 24px; }
        .reg-logo img { height: 60px; }
        .reg-title { font-size: 1.5rem; font-weight: 800; text-align: center; margin-bottom: 4px; }
        .reg-sub { text-align: center; color: var(--text-muted); font-size: .88rem; margin-bottom: 32px; }

        .fl { display: flex; flex-direction: column; gap: 6px; margin-bottom: 20px; }
        .fl label { font-size: .82rem; color: var(--text-muted); }
        .fl label .req { color: #ef4444; }
        .fl-row { display: flex; align-items: center; gap: 8px; border-bottom: 1px solid var(--border-color); transition: border-color .2s; }
        .fl-row:focus-within { border-color: var(--primary-color); }
        .fl-row input, .fl-row select { flex: 1; background: transparent; border: none; padding: 9px 0; color: var(--text-light); font-size: .95rem; outline: none; }
        .fl-row input::placeholder { color: #4b5563; }
        .fl-row select option { background: var(--bg-secondary); }
        .eye-btn { background: none; border: none; cursor: pointer; color: var(--text-muted); padding: 4px; font-size: 1rem; }
        .eye-btn:hover { color: var(--text-light); }

        .fl-row-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
        .fl-row-2 .fl { margin-bottom: 0; }

        .tel-wrap { display: flex; align-items: center; border-bottom: 1px solid var(--border-color); transition: border-color .2s; }
        .tel-wrap:focus-within { border-color: var(--primary-color); }
        .tel-code { background: transparent; border: none; color: var(--text-light); font-size: .95rem; outline: none; padding: 9px 0; width: 80px; flex-shrink: 0; }
        .tel-code option { background: var(--bg-secondary); }
        .tel-sep { color: var(--border-color); margin: 0 6px; }
        .tel-number { flex: 1; background: transparent; border: none; color: var(--text-light); font-size: .95rem; outline: none; padding: 9px 0; }
        .tel-number::placeholder { color: #4b5563; }

        .section-sep { border: none; border-top: 1px solid var(--border-color); margin: 8px 0 24px; }
        .section-label { font-size: .75rem; color: var(--text-muted); font-weight: 700; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 20px; display: block; }

        .btn-submit { width: 100%; background: linear-gradient(135deg, var(--primary-color), var(--secondary-color)); color: #fff; border: none; border-radius: 10px; padding: 14px; font-size: 1rem; font-weight: 800; letter-spacing: .5px; cursor: pointer; transition: opacity .2s; margin-top: 8px; }
        .btn-submit:hover { opacity: .88; }
        .btn-submit:disabled { opacity: .5; cursor: not-allowed; }
        .form-error { color: #ef4444; font-size: .85rem; text-align: center; min-height: 1.2em; margin-top: 10px; }
        .reg-footer { text-align: center; margin-top: 24px; font-size: .88rem; color: var(--text-muted); }
        .reg-footer a { color: var(--primary-color); text-decoration: none; font-weight: 700; }
        .reg-footer a:hover { text-decoration: underline; }
        .outro-input { display: none; margin-top: 8px; }
        .outro-input input { width: 100%; background: transparent; border: none; border-bottom: 1px solid var(--primary-color); color: var(--text-light); font-size: .92rem; outline: none; padding: 6px 0; }
        .outro-input input::placeholder { color: #4b5563; }
        .tel-code-outro { display: none; width: 64px !important; border-bottom: 1px solid var(--primary-color) !important; background: transparent !important; color: var(--text-light) !important; font-size: .92rem !important; outline: none !important; padding: 6px 0 !important; text-align: center; margin-right: 6px; }
        input:-webkit-autofill,input:-webkit-autofill:hover,input:-webkit-autofill:focus,textarea:-webkit-autofill,select:-webkit-autofill {-webkit-box-shadow: 0 0 0px 1000px #1f2937 inset !important; -webkit-text-fill-color: #fff !important; caret-color: #fff; transition: background-color transparent ease-in-out 0s;}
        html[data-theme="light"] input:-webkit-autofill,html[data-theme="light"] input:-webkit-autofill:hover,html[data-theme="light"] input:-webkit-autofill:focus {-webkit-box-shadow: 0 0 0px 1000px #ffffff inset !important; -webkit-text-fill-color: #1e293b !important; caret-color: #1e293b;}
        input[type="date"]::-webkit-calendar-picker-indicator {filter: brightness(0) invert(1);cursor: pointer;}
        html[data-theme="light"] input[type="date"]::-webkit-calendar-picker-indicator {filter: none;}
        .fl-row select,.fl-row select option { color: #fff !important; background: #1e293b !important; font-family: "Segoe UI", sans-serif;}
        html[data-theme="light"] .fl-row select,html[data-theme="light"] .fl-row select option,html[data-theme="light"] .tel-code,html[data-theme="light"] .tel-code option {color: var(--text-light) !important; background: var(--bg-secondary) !important;}

        @media (max-width: 480px) {
            .reg-card { padding: 28px 20px; }
            .fl-row-2 { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body data-page-title="reg.pageTitle">
<nav class="navbar">
    <div class="container">
        <a href="index.html" class="logo">
            <img src="icons/logoheader.png" class="logo">
            <span class="logo2"><img src="icons/logoheader2.png" alt="Alpha Prime"></span>
        </a>
        <ul class="nav-links">
            <li><a href="index.html" data-i18n="nav.home">Início</a></li>
            <li><a href="index.html#features" data-i18n="nav.features">Funcionalidades</a></li>
            <li><a href="index.html#download" data-i18n="nav.download">Download</a></li>
            <li><a href="index.html#contact" data-i18n="nav.contact">Contato</a></li>
        </ul>
        <div class="nav-auth">
            <button class="btn-nav-login" onclick="window.location.href='login.html'" data-i18n="nav.login">Entrar</button>
        </div>
        <button class="theme-toggle" title="Modo claro">☀️</button>
        <button class="menu-toggle">☰</button>
    </div>
</nav>

<div class="reg-page">
    <div class="reg-card">
        <div class="reg-logo">
            <img src="icons/logo.png" alt="Alpha Prime">
        </div>
        <h1 class="reg-title" data-i18n="reg.heading">Criar conta</h1>
        <p class="reg-sub" data-i18n="reg.sub">Preencha os dados abaixo para começar</p>

        <!-- Dados pessoais -->
        <span class="section-label" data-i18n="reg.sectionPersonal">Dados pessoais</span>

        <div class="fl">
            <label><span data-i18n="reg.fullName">Nome completo</span> <span class="req">*</span></label>
            <div class="fl-row">
                <input type="text" id="nome" data-i18n-ph="ph.fullName" placeholder="O seu nome completo" autocomplete="name" autofocus>
            </div>
        </div>

        <div class="fl-row-2">
            <div class="fl">
                <label data-i18n="reg.country">País</label>
                <div class="fl-row">
                    <select id="pais" onchange="onPaisChange(this)">
                        <option value="" data-i18n="ph.selectCountry">Selecionar…</option>
                        <option value="PT">🇵🇹 Portugal</option>
                        <option value="BR">🇧🇷 Brasil</option>
                        <option value="AO">🇦🇴 Angola</option>
                        <option value="MZ">🇲🇿 Moçambique</option>
                        <option value="CV">🇨🇻 Cabo Verde</option>
                        <option value="GW">🇬🇼 Guiné-Bissau</option>
                        <option value="ST">🇸🇹 São Tomé e Príncipe</option>
                        <option value="TL">🇹🇱 Timor-Leste</option>
                        <option value="FR">🇫🇷 França</option>
                        <option value="GB">🇬🇧 Reino Unido</option>
                        <option value="DE">🇩🇪 Alemanha</option>
                        <option value="CH">🇨🇭 Suíça</option>
                        <option value="LU">🇱🇺 Luxemburgo</option>
                        <option value="US">🇺🇸 Estados Unidos</option>
                        <option value="CA">🇨🇦 Canadá</option>
                        <option value="OTHER">Outro…</option>
                    </select>
                </div>
                <div class="outro-input" id="pais-outro-wrap">
                    <input type="text" id="pais-outro" data-i18n-ph="ph.typeCountry" placeholder="Digite o seu país">
                </div>
            </div>
            <div class="fl">
                <label data-i18n="reg.birthdate">Data de nascimento</label>
                <div class="fl-row">
                    <input type="date" id="data_nascimento" max="2010-01-01">
                </div>
            </div>
        </div>

        <div class="fl">
            <label data-i18n="reg.phone">Telefone</label>
            <div class="tel-wrap">
                <select class="tel-code" id="tel-code" onchange="onTelCodeChange(this)">
                    <option value="+351">🇵🇹 +351</option>
                    <option value="+55">🇧🇷 +55</option>
                    <option value="+244">🇦🇴 +244</option>
                    <option value="+258">🇲🇿 +258</option>
                    <option value="+238">🇨🇻 +238</option>
                    <option value="+33">🇫🇷 +33</option>
                    <option value="+44">🇬🇧 +44</option>
                    <option value="+49">🇩🇪 +49</option>
                    <option value="+41">🇨🇭 +41</option>
                    <option value="+1">🇺🇸 +1</option>
                    <option value="OTHER">Outro…</option>
                </select>
                <input type="text" id="tel-code-outro" class="tel-code-outro" placeholder="+___" maxlength="6">
                <span class="tel-sep">|</span>
                <input type="tel" class="tel-number" id="tel-number" placeholder="912 345 678">
            </div>
        </div>

        <hr class="section-sep">
        <span class="section-label" data-i18n="reg.sectionAccess">Acesso à conta</span>

        <div class="fl">
            <label><span data-i18n="reg.email">Email</span> <span class="req">*</span></label>
            <div class="fl-row">
                <input type="email" id="email" placeholder="o_seu@email.com" autocomplete="email">
            </div>
        </div>

        <div class="fl">
            <label data-i18n="reg.emailSecondary">Email secundário</label>
            <div class="fl-row">
                <input type="email" id="email_secundario" data-i18n-ph="ph.emailRecovery" placeholder="email de recuperação (opcional)" autocomplete="off">
            </div>
        </div>

        <div class="fl">
            <label><span data-i18n="reg.password">Senha</span> <span class="req">*</span></label>
            <div class="fl-row">
                <input type="password" id="senha" data-i18n-ph="ph.minChars" placeholder="Mínimo 6 caracteres" autocomplete="new-password">
                <button class="eye-btn" onclick="toggleEye('senha',this)">👁</button>
            </div>
        </div>

        <div class="fl">
            <label><span data-i18n="reg.repeatPassword">Repetir senha</span> <span class="req">*</span></label>
            <div class="fl-row">
                <input type="password" id="senha2" data-i18n-ph="ph.repeatPw" placeholder="Repita a senha" autocomplete="new-password" onkeydown="if(event.key==='Enter')doRegister()">
                <button class="eye-btn" onclick="toggleEye('senha2',this)">👁</button>
            </div>
        </div>

        <button class="btn-submit" id="btn-reg" onclick="doRegister()" data-i18n="reg.btn">CRIAR CONTA</button>
        <p class="form-error" id="form-error"></p>

        <div class="reg-footer">
            <span data-i18n="reg.hasAccount">Já tem conta?</span> <a href="login.html" data-i18n="reg.loginLink">Entrar</a>
        </div>
    </div>
</div>

<footer>
    <div class="footer">
        <p data-i18n="footer.rights">&copy; 2026 Alpha Prime. Todos os direitos reservados.</p>
        <div class="footer-links">
            <a href="legal.html" data-i18n="footer.terms">Termos de Uso</a>
        </div>
    </div>
</footer>

<script src="theme.js"></script>
<script src="i18n.js"></script>
<script src="script.js"></script>
<script>
    if (localStorage.getItem('ap_user')) window.location.replace('playlists.html');

    function toggleEye(id, btn) {
        const input = document.getElementById(id);
        const hide = input.type === 'password';
        input.type = hide ? 'text' : 'password';
        btn.textContent = hide ? '🙈' : '👁';
    }

    const DDI_MAP = { PT:'+351', BR:'+55', AO:'+244', MZ:'+258', CV:'+238', GW:'+245', FR:'+33', GB:'+44', DE:'+49', CH:'+41', LU:'+352', US:'+1', CA:'+1', TL:'+670', ST:'+239' };

    function onPaisChange(sel) {
        const wrap = document.getElementById('pais-outro-wrap');
        const isOther = sel.value === 'OTHER';
        wrap.style.display = isOther ? 'block' : 'none';
        if (isOther) { setTimeout(() => document.getElementById('pais-outro').focus(), 50); return; }
        const code = DDI_MAP[sel.value];
        if (code) {
            document.getElementById('tel-code').value = code;
            document.getElementById('tel-code-outro').style.display = 'none';
            document.getElementById('tel-code').style.display = '';
        }
    }

    function onTelCodeChange(sel) {
        const outro = document.getElementById('tel-code-outro');
        const isOther = sel.value === 'OTHER';
        outro.style.display = isOther ? 'inline-block' : 'none';
        if (isOther) setTimeout(() => outro.focus(), 50);
    }

    async function doRegister() {
        const t = window.__i18n.t;
        const errEl = document.getElementById('form-error');
        errEl.textContent = '';

        const nome             = document.getElementById('nome').value.trim();
        const email            = document.getElementById('email').value.trim();
        const email_secundario = document.getElementById('email_secundario').value.trim();
        const senha            = document.getElementById('senha').value;
        const senha2           = document.getElementById('senha2').value;
        const paisSel          = document.getElementById('pais').value;
        const pais             = paisSel === 'OTHER' ? document.getElementById('pais-outro').value.trim() : paisSel;
        const data_nascimento  = document.getElementById('data_nascimento').value;
        const telCodeSel       = document.getElementById('tel-code').value;
        const telCode          = telCodeSel === 'OTHER' ? document.getElementById('tel-code-outro').value.trim() : telCodeSel;
        const telNum           = document.getElementById('tel-number').value.trim();
        const telefone         = telNum ? (telCode + ' ' + telNum) : '';

        if (!nome)            { errEl.textContent = t('reg.errName');   return; }
        if (!email)           { errEl.textContent = t('reg.errEmail');  return; }
        if (!senha)           { errEl.textContent = t('reg.errPw');     return; }
        if (senha.length < 6) { errEl.textContent = t('reg.errPwLen'); return; }
        if (senha !== senha2) { errEl.textContent = t('reg.errPwMatch'); return; }

        const btn = document.getElementById('btn-reg');
        btn.disabled = true; btn.textContent = t('reg.loading');

        try {
            const res  = await fetch('/api/auth/register', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ nome, email, senha, email_secundario: email_secundario || null, pais: pais || null, telefone: telefone || null, data_nascimento: data_nascimento || null })
            });
            const data = await res.json();
            if (!res.ok) { errEl.textContent = data.error || t('reg.errCreate'); return; }

            localStorage.setItem('ap_user', JSON.stringify({ token: data.token, nome: data.nome, email: data.email }));
            window.location.replace('playlists.html');
        } catch(e) {
            errEl.textContent = t('reg.errServer');
        } finally {
            btn.disabled = false; btn.textContent = t('reg.btn');
        }
    }
</script>
</body>
</html>
